<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f3efe6; --card: #fffdf9; --card2: #ede9e0; --border: #d8d2c8;
      --accent: #d2724f; --text: #211e19; --muted: #6b6560;
      --green: #4a8c5c; --red: #b83c2f; --gold: #a07800;
      --radius: 16px; --nav-h: 68px;
    }
    html.dark {
      --bg: #1a1714; --card: #242019; --card2: #2d2924; --border: #3a3530;
      --text: #f0ece3; --muted: #8a8480;
    }
    html, body { height: 100%; overflow-x: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Hanken Grotesk', -apple-system, sans-serif; font-size: 16px; transition: background .2s, color .2s; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100dvh; }
    .view { display: none; padding: 0 16px calc(var(--nav-h) + 20px); min-height: 100dvh; }
    .view.active { display: block; }

    nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: var(--nav-h); background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
    .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: var(--muted); font-size: 0.58rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; border: none; background: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; padding: 6px 0; font-family: inherit; }
    .nav-tab.active { color: var(--accent); }
    .nav-tab svg { width: 22px; height: 22px; flex-shrink: 0; }

    .page-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 0 14px; gap: 8px; }
    .page-title { font-size: 1.7rem; font-weight: 800; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; border: none; border-radius: 12px; font-weight: 700; padding: 12px 18px; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; white-space: nowrap; font-size: 0.875rem; font-family: inherit; }
    .btn:active { opacity: .72; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: none; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 8px 12px; font-size: 0.78rem; }
    .dark-toggle { background: none; border: 1.5px solid var(--border); border-radius: 10px; color: var(--muted); padding: 5px 8px; font-size: 1rem; cursor: pointer; touch-action: manipulation; line-height: 1; }
    .profile-btn { background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: .75rem; font-weight: 700; padding: 5px 9px; cursor: pointer; touch-action: manipulation; font-family: inherit; display: flex; align-items: center; gap: 3px; max-width: 86px; }
    .profile-btn-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }

    .rest-pill { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; border-radius: 20px; padding: 7px 14px; font-size: .82rem; font-weight: 700; display: flex; align-items: center; gap: 10px; z-index: 150; box-shadow: 0 2px 14px rgba(0,0,0,.2); white-space: nowrap; }
    .rest-pill.hidden { display: none; }
    .rest-pill-time { font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
    .rest-pill-skip { background: rgba(255,255,255,.25); border: none; color: #fff; border-radius: 10px; font-size: .72rem; font-weight: 700; padding: 3px 8px; cursor: pointer; touch-action: manipulation; font-family: inherit; }

    .timer-card { background: var(--card); border-radius: var(--radius); padding: 18px 16px 16px; margin-bottom: 12px; border: 1px solid var(--border); }
    .timer-idle { text-align: center; }
    .timer-idle-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
    .timer-idle-time { font-size: 2.4rem; font-weight: 400; color: var(--text); font-family: 'Newsreader', Georgia, serif; font-style: italic; letter-spacing: -1px; }
    .timer-rest { display: none; }
    .timer-rest.active { display: block; }
    .timer-idle.hidden { display: none; }
    .arc-wrap { position: relative; width: 116px; height: 116px; margin: 0 auto 14px; }
    .arc-wrap svg { width: 116px; height: 116px; transform: rotate(-90deg); }
    .arc-bg { fill: none; stroke: var(--border); stroke-width: 7; }
    .arc-fg { fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .95s linear; }
    .arc-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .timer-count { font-size: 1.65rem; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); letter-spacing: -1px; }
    .timer-count.warning { color: var(--red); }
    .timer-controls { display: flex; gap: 8px; }
    .t-adj { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: .82rem; font-weight: 700; padding: 9px 4px; cursor: pointer; touch-action: manipulation; text-align: center; font-family: inherit; }
    .t-adj:active { background: var(--border); }
    .t-skip { flex: 2; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: .82rem; font-weight: 700; padding: 9px 4px; cursor: pointer; touch-action: manipulation; font-family: inherit; }

    /* today activity summary */
    .today-activity { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--accent); margin-bottom: 12px; overflow: hidden; }
    .today-activity-hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; touch-action: manipulation; gap: 10px; }
    .today-activity-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .12em; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
    .today-activity-summary { font-size: .84rem; font-weight: 600; }
    .today-activity-chev { color: var(--muted); font-size: 1.3rem; transition: transform .2s; flex-shrink: 0; }
    .today-activity.open .today-activity-chev { transform: rotate(90deg); }
    .today-activity-body { display: none; border-top: 1px solid var(--border); padding: 10px 16px 14px; }
    .today-activity.open .today-activity-body { display: block; }
    .ta-session-label { font-size: .7rem; color: var(--accent); font-weight: 700; margin: 10px 0 5px; }
    .ta-session-label:first-child { margin-top: 0; }
    .ta-ex-row { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; border-bottom: 1px solid var(--border); font-size: .78rem; }
    .ta-ex-row:last-child { border-bottom: none; }
    .ta-ex-name { font-weight: 700; white-space: nowrap; flex-shrink: 0; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
    .ta-ex-count { font-size: .68rem; color: var(--muted); flex-shrink: 0; }
    .ta-ex-count.ok { color: var(--green); }
    .ta-ex-detail { color: var(--muted); font-size: .68rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* exercise cards */
    .ex-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1.5px solid var(--border); transition: border-color .2s; }
    .ex-card.has-sets { border-color: var(--accent); }
    .ex-card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; min-width: 0; }
    .ex-card-info { flex: 1; min-width: 0; }
    .ex-name { font-size: 1rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ex-cat { font-size: .65rem; color: var(--muted); margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .ex-card-right { flex-shrink: 0; }
    .set-progress { font-size: .75rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .set-progress.on-target { color: var(--green); }
    .badge-row { margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
    .target-badge { font-size: .7rem; color: var(--accent); background: rgba(210,114,79,.1); border-radius: 8px; padding: 3px 9px; font-weight: 600; border: 1px solid rgba(210,114,79,.2); }
    .progress-badge { font-size: .7rem; color: var(--green); background: rgba(74,140,92,.1); border-radius: 8px; padding: 3px 9px; font-weight: 600; border: 1px solid rgba(74,140,92,.25); }
    .pb-badge { font-size: .7rem; color: var(--gold); background: rgba(160,120,0,.08); border-radius: 8px; padding: 3px 9px; font-weight: 600; border: 1px solid rgba(160,120,0,.2); }
    .prev-best { font-size: .72rem; color: var(--muted); background: var(--card2); border-radius: 10px; padding: 7px 11px; margin-bottom: 10px; line-height: 1.4; border: 1px solid var(--border); }
    .prev-best strong { color: var(--text); }

    .set-toggles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .set-toggle { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--border); background: var(--card2); color: var(--muted); font-size: .875rem; font-weight: 700; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s, color .15s; font-family: inherit; flex-shrink: 0; }
    .set-toggle.done { background: var(--accent); border-color: var(--accent); color: #fff; }
    .set-toggle:active { transform: scale(.88); }

    .log-row { display: flex; gap: 6px; align-items: stretch; margin-bottom: 6px; }
    .log-row input { flex: 1; min-width: 0; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: .9rem; padding: 9px 6px; text-align: center; outline: none; -moz-appearance: textfield; font-family: inherit; }
    .log-row input::-webkit-inner-spin-button, .log-row input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .log-row input:focus { border-color: var(--accent); }
    .log-sep { color: var(--muted); font-size: .8rem; display: flex; align-items: center; flex-shrink: 0; }
    .bw-hint { font-size: .65rem; color: var(--muted); margin-bottom: 8px; }
    .rest-trigger { width: 100%; background: none; border: 1.5px solid var(--border); border-radius: 10px; color: var(--muted); font-size: .78rem; font-weight: 600; padding: 8px; cursor: pointer; touch-action: manipulation; font-family: inherit; }
    .rest-trigger:active { background: var(--card2); }
    .notes-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
    .notes-area { width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: .88rem; padding: 10px 14px; outline: none; resize: none; font-family: inherit; min-height: 64px; }
    .notes-area:focus { border-color: var(--accent); }

    .finish-bar { background: rgba(74,140,92,.1); border: 1.5px solid rgba(74,140,92,.3); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
    .finish-bar span { color: var(--green); font-weight: 700; font-size: .88rem; }
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-state h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); font-size: .88rem; margin-bottom: 20px; line-height: 1.6; }

    .day-row { background: var(--card); border-radius: var(--radius); padding: 15px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; border: 1.5px solid var(--border); }
    .day-row.today { border-color: var(--accent); }
    .day-name-wrap { display: flex; align-items: center; gap: 7px; min-width: 44px; flex-shrink: 0; }
    .day-name { font-weight: 700; font-size: .95rem; }
    .today-badge { font-size: .6rem; background: rgba(210,114,79,.18); color: var(--accent); border-radius: 6px; padding: 2px 6px; font-weight: 700; flex-shrink: 0; }
    .day-workout { flex: 1; min-width: 0; font-size: .88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .day-workout.rest { color: var(--muted); font-style: italic; }
    .day-chevron { color: var(--border); font-size: 1.2rem; flex-shrink: 0; }

    .session-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; border: 1px solid var(--border); }
    .session-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .session-info { min-width: 0; flex: 1; }
    .session-date { font-weight: 700; font-size: .92rem; }
    .session-group { font-size: .75rem; color: var(--accent); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .session-meta { font-size: .75rem; color: var(--muted); text-align: right; line-height: 1.6; flex-shrink: 0; }
    .session-body { margin-top: 12px; display: none; border-top: 1px solid var(--border); padding-top: 10px; }
    .session-body.open { display: block; }
    .session-ex { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .8rem; }
    .session-ex:last-child { border-bottom: none; }
    .session-ex-name { font-weight: 700; margin-bottom: 2px; }
    .session-sets { color: var(--muted); word-break: break-word; }
    .session-note { font-size: .78rem; color: var(--muted); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.4; }

    .vol-chart-wrap { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; border: 1px solid var(--border); }
    .vol-chart-title { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 700; margin-bottom: 12px; }

    .lib-tabs { display: flex; background: var(--card2); border-radius: 12px; padding: 4px; margin-bottom: 16px; border: 1px solid var(--border); gap: 4px; }
    .lib-tab { flex: 1; text-align: center; padding: 8px; font-size: .82rem; font-weight: 700; border-radius: 9px; cursor: pointer; color: var(--muted); touch-action: manipulation; border: none; background: none; font-family: inherit; transition: all .15s; }
    .lib-tab.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 4px rgba(33,30,25,.1); }
    .section-title { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 18px 0 8px; font-weight: 700; }
    .list-item { background: var(--card); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
    .list-item-text { flex: 1; min-width: 0; }
    .list-item-name { font-size: .92rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-item-sub { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .list-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px 8px; font-size: .95rem; touch-action: manipulation; border-radius: 8px; font-family: inherit; }
    .icon-btn:active { background: var(--card2); color: var(--red); }
    .cat-group-label { font-size: .68rem; color: var(--muted); font-weight: 700; margin: 12px 0 5px; text-transform: uppercase; letter-spacing: .06em; }
    .data-row { display: flex; gap: 8px; margin: 8px 0 6px; }
    .sync-note { font-size: .72rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .sync-status { font-size: .75rem; font-weight: 600; padding: 6px 0; }
    .sync-ok { color: var(--green); }
    .sync-err { color: var(--red); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(33,30,25,.6); z-index: 200; align-items: flex-end; -webkit-tap-highlight-color: transparent; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 24px 24px 0 0; padding: 12px 16px calc(20px + env(safe-area-inset-bottom,0)); width: 100%; max-width: 480px; margin: 0 auto; max-height: 88dvh; overflow-y: auto; overscroll-behavior: contain; border-top: 1px solid var(--border); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 14px; }
    .modal-option { padding: 13px 10px; border-radius: 12px; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: space-between; gap: 8px; touch-action: manipulation; -webkit-tap-highlight-color: transparent; font-weight: 500; }
    .modal-option:active { background: var(--card2); }
    .modal-option.selected { background: rgba(210,114,79,.1); color: var(--accent); font-weight: 700; }
    .modal-option-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-input { width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: .95rem; padding: 12px 14px; outline: none; margin-bottom: 12px; font-family: inherit; }
    .modal-input:focus { border-color: var(--accent); }
    .modal-label { font-size: .72rem; color: var(--muted); font-weight: 700; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }

    .profile-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; cursor: pointer; touch-action: manipulation; }
    .profile-item:active { background: var(--card2); }
    .profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 800; font-size: .9rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .profile-avatar.dim { background: var(--card2); color: var(--muted); border: 1.5px solid var(--border); }
    .profile-item-name { flex: 1; font-weight: 600; font-size: .92rem; }

    .group-ex-item { background: var(--card2); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; border: 1px solid var(--border); }
    .group-ex-top { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; }
    .group-ex-name { flex: 1; min-width: 0; font-size: .88rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-ex-cat { font-size: .62rem; color: var(--muted); flex-shrink: 0; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .group-ex-targets { display: flex; gap: 4px; align-items: center; }
    .group-ex-targets input { background: var(--card); border: 1.5px solid var(--border); border-radius: 9px; color: var(--text); font-size: .82rem; padding: 7px 4px; text-align: center; outline: none; -moz-appearance: textfield; font-family: inherit; width: 48px; }
    .group-ex-targets input::-webkit-inner-spin-button, .group-ex-targets input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .group-ex-targets input:focus { border-color: var(--accent); }
    .group-ex-targets label { font-size: .6rem; color: var(--muted); text-align: center; white-space: nowrap; font-weight: 600; }
    .group-ex-targets-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .gxt-sep { color: var(--muted); font-size: .72rem; padding-bottom: 12px; }
    .order-btn { background: none; border: 1.5px solid var(--border); color: var(--muted); border-radius: 7px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .8rem; touch-action: manipulation; flex-shrink: 0; padding: 0; font-family: inherit; }
    .order-btn:active { background: var(--card); }
    .order-btn:disabled { opacity: .25; pointer-events: none; }
    .preset { background: var(--card2); border: 1.5px solid var(--border); color: var(--muted); border-radius: 10px; padding: 6px 13px; font-size: .78rem; cursor: pointer; touch-action: manipulation; font-family: inherit; font-weight: 700; }
    .preset.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  </style>
</head>
<body>
<div id="app">

  <div id="view-today" class="view active">
    <div class="page-header">
      <div class="page-title" id="todayTitle">Today</div>
      <div class="header-actions">
        <button class="profile-btn" id="profileBtn" onclick="openProfileModal()">
          <span class="profile-btn-name" id="profileBtnName">Me</span> ▾
        </button>
        <button class="dark-toggle" id="darkBtn" onclick="toggleDark()">🌙</button>
        <button class="btn btn-ghost btn-sm" onclick="openGroupPicker('today')">Change</button>
      </div>
    </div>
    <div class="timer-card" id="timerSection">
      <div class="timer-idle" id="timerIdle">
        <div class="timer-idle-label">Session Time</div>
        <div class="timer-idle-time" id="elapsedDisplay">—</div>
      </div>
      <div class="timer-rest" id="timerRest">
        <div class="arc-wrap">
          <svg viewBox="0 0 116 116">
            <circle class="arc-bg" cx="58" cy="58" r="50"/>
            <circle class="arc-fg" id="timerArc" cx="58" cy="58" r="50"/>
          </svg>
          <div class="arc-text"><div class="timer-count" id="timerDisplay">1:30</div></div>
        </div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const DEFAULT_SCHEDULE = {0:null,1:'g-bench',2:'g-squat',3:null,4:'g-deadlift',5:'g-tkd',6:null};

// ── Profiles ──────────────────────────────────────────────────────────────────
function initProfiles() {
  if (localStorage.getItem('wapp_profiles')) return;
  const id = 'p_' + Math.random().toString(36).slice(2,8);
  localStorage.setItem('wapp_profiles', JSON.stringify([{id, name:'Me'}]));
  localStorage.setItem('wapp_active', id);
  const old = localStorage.getItem('wapp_v3');
  if (old) localStorage.setItem('wapp_' + id, old);
}
function getProfiles() { return JSON.parse(localStorage.getItem('wapp_profiles') || '[]'); }
function getActiveId() { return localStorage.getItem('wapp_active') || getProfiles()[0]?.id || ''; }
function getActiveProfile() { return getProfiles().find(p => p.id === getActiveId()); }
function dbKey() { return 'wapp_' + getActiveId(); }
function updateProfileBtn() {
  const p = getActiveProfile();
  const el = document.getElementById('profileBtnName');
  if (el && p) el.textContent = p.name;
}

function openProfileModal() {
  renderProfileList();
  document.getElementById('newProfileName').value = '';
  document.getElementById('profileOverlay').classList.add('open');
}
function renderProfileList() {
  const profiles = getProfiles();
  const activeId = getActiveId();
  const el = document.getElementById('profileList');
  el.innerHTML = profiles.map(p => {
    const isActive = p.id === activeId;
    return `<div class="profile-item" data-pid="${p.id}">
      <div class="profile-avatar${isActive?'':' dim'}">${(p.name[0]||'?').toUpperCase()}</div>
      <div class="profile-item-name">${p.name}</div>
      ${isActive
        ? '<span style="color:var(--accent);font-weight:700">✓</span>'
        : `<button style="background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px 8px" data-del="${p.id}">×</button>`}
    </div>`;
  }).join('');
  el.querySelectorAll('.profile-item').forEach(item => {
    item.addEventListener('click', () => {
      const pid = item.dataset.pid;
      if (pid !== activeId) switchProfile(pid);
    });
  });
  el.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteProfile(btn.dataset.del); });
  });
}
function switchProfile(id) {
  localStorage.setItem('wapp_active', id);
  closeModal('profileOverlay');
  loadDB(); updateProfileBtn(); renderToday();
}
function addProfile() {
  const name = document.getElementById('newProfileName').value.trim();
  if (!name) { document.getElementById('newProfileName').focus(); return; }
  const id = 'p_' + Math.random().toString(36).slice(2,8);
  const profiles = getProfiles();
  profiles.push({id, name});
  localStorage.setItem('wapp_profiles', JSON.stringify(profiles));
  switchProfile(id);
}
function deleteProfile(id) {
  const profiles = getProfiles();
  if (profiles.length <= 1) { alert("Can't delete the only profile."); return; }
  if (!confirm('Delete this profile and all its data?')) return;
  const remaining = profiles.filter(p => p.id !== id);
  localStorage.setItem('wapp_profiles', JSON.stringify(remaining));
  localStorage.removeItem('wapp_' + id);
  if (getActiveId() === id) switchProfile(remaining[0].id);
  else renderProfileList();
}

// ── DB ────────────────────────────────────────────────────────────────────────
let db;
function loadDB() {
  try { db = JSON.parse(localStorage.getItem(dbKey()) || 'null'); } catch { db = null; }
  if (!db) {
    db = {exercises:clone(DEFAULT_EXERCISES), groups:clone(DEFAULT_GROUPS), schedule:{...DEFAULT_SCHEDULE}, sessions:[]};
    saveDB(); return;
  }
  db.groups = (db.groups||[]).map(g => {
    if (g.exerciseIds && !g.exercises)
      return {...g, exercises:g.exerciseIds.map(exId=>({exId,targetSets:3,targetReps:10,targetWeight:null,restSeconds:90})), exerciseIds:undefined};
    return g;
  });
  if (!db.schedule) db.schedule = {...DEFAULT_SCHEDULE};
  saveDB();
}
function saveDB() {
  localStorage.setItem(dbKey(), JSON.stringify(db));
  scheduleAutoSync();
}
function clone(x) { return JSON.parse(JSON.stringify(x)); }
function uid() { return '_' + Math.random().toString(36).slice(2,9); }
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayDow() { return new Date().getDay(); }
function getEx(id) { return db.exercises.find(e=>e.id===id); }
function getGroup(id) { return db.groups.find(g=>g.id===id); }
function fmtDate(s) { return new Date(s+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}); }
function fmtT(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function fmtElapsed(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0 ? `${h}:${(m%60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}` : `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function fmtSet(st) { return (st.w!=null?st.w+'kg×':'BW×')+st.r+'r'; }

// ── PB ────────────────────────────────────────────────────────────────────────
function getPB(exId) {
  const all = db.sessions.filter(s=>s.finished).flatMap(s=>s.sets[exId]||[]);
  if (!all.length) return null;
  const weighted = all.filter(s=>s.w!=null&&s.w>0);
  if (weighted.length) return weighted.reduce((a,b)=>a.w>b.w||(a.w===b.w&&a.r>b.r)?a:b);
  return all.reduce((a,b)=>a.r>b.r?a:b);
}
function fmtPB(pb) { return pb.w!=null ? `${pb.w}kg × ${pb.r}r` : `${pb.r} reps`; }

// ── Sessions ──────────────────────────────────────────────────────────────────
function getActiveSession() { return db.sessions.find(s=>s.date===todayStr()&&!s.finished); }
function startSession(groupId) {
  const s={id:uid(),date:todayStr(),groupId,sets:{},startTs:Date.now(),finished:false};
  db.sessions.push(s); saveDB(); return s;
}
function finishSession() {
  const s=getActiveSession(); if(!s) return;
  s.finished=true; s.finishedTs=Date.now(); saveDB(); stopElapsedTimer(); renderToday();
}
function cancelSession() {
  if(!confirm('Cancel this session? All logged sets will be lost.')) return;
  const s=getActiveSession(); if(!s) return;
  db.sessions=db.sessions.filter(x=>x.id!==s.id);
  saveDB(); stopElapsedTimer(); skipTimer(); renderToday();
}
function logSetToSession(exId,w,r) {
  const s=getActiveSession(); if(!s) return;
  if(!s.sets[exId]) s.sets[exId]=[];
  s.sets[exId].push({w,r}); saveDB();
}
function saveNotes(text) { const s=getActiveSession(); if(!s) return; s.notes=text; saveDB(); }
function getPrevBest(exId) {
  const today=todayStr();
  return [...db.sessions].reverse().find(s=>s.finished&&s.date!==today&&s.sets[exId]?.length>0)||null;
}
function checkProgressReady(exId,targetSets) {
  if(!targetSets) return false;
  const past=db.sessions.filter(s=>s.finished&&(s.sets[exId]||[]).length>=targetSets);
  return past.slice(-2).length>=2;
}

// ── Timer ─────────────────────────────────────────────────────────────────────
let timerDur=90,timerRem=90,timerIv=null,timerOn=false,elapsedIv=null;

function updateTimerUI() {
  const d=document.getElementById('timerDisplay');
  const arc=document.getElementById('timerArc');
  const idle=document.getElementById('timerIdle');
  const rest=document.getElementById('timerRest');
  const pill=document.getElementById('restPill');
  const pillTime=document.getElementById('restPillTime');
  if(!d) return;
  d.textContent=fmtT(timerRem);
  d.className='timer-count'+(timerOn&&timerRem<=10?' warning':'');
  if(arc){const p=timerDur>0?timerRem/timerDur:0;arc.style.strokeDasharray=ARC_LEN;arc.style.strokeDashoffset=ARC_LEN*(1-p);}
  const showRest=timerOn||timerRem<timerDur;
  idle?.classList.toggle('hidden',showRest);
  rest?.classList.toggle('active',showRest);
  if(pill&&pillTime){pill.classList.toggle('hidden',!timerOn);pillTime.textContent=fmtT(timerRem);}
}
function startElapsedTimer() { if(elapsedIv) clearInterval(elapsedIv); updateElapsed(); elapsedIv=setInterval(updateElapsed,1000); }
function stopElapsedTimer() { if(elapsedIv){clearInterval(elapsedIv);elapsedIv=null;} }
function updateElapsed() {
  const s=getActiveSession();
  const el=document.getElementById('elapsedDisplay');
  if(!el) return;
  el.textContent=(s&&s.startTs)?fmtElapsed(Date.now()-s.startTs):'—';
}
function toggleTimer() {
  if(timerOn){clearInterval(timerIv);timerOn=false;}
  else {
    if(timerRem===0) timerRem=timerDur;
    timerOn=true;
    timerIv=setInterval(()=>{
      timerRem--; updateTimerUI();
      if(timerRem<=0){
        clearInterval(timerIv);timerOn=false;timerRem=0;
        if('vibrate' in navigator) navigator.vibrate([200,100,200]);
        updateTimerUI();
        setTimeout(()=>{timerRem=timerDur;updateTimerUI();},1500);
      }
    },1000);
  }
  updateTimerUI();
}
function adjustTimer(delta){timerRem=Math.max(5,timerRem+delta);if(timerRem>timerDur)timerDur=timerRem;updateTimerUI();}
function skipTimer(){clearInterval(timerIv);timerOn=false;timerRem=timerDur;updateTimerUI();}
function startRest(duration){if(duration)timerDur=duration;clearInterval(timerIv);timerOn=false;timerRem=timerDur;toggleTimer();}

// ── Dark mode ─────────────────────────────────────────────────────────────────
function toggleDark(){
  const isDark=document.documentElement.classList.toggle('dark');
  localStorage.setItem('wapp_dark',isDark?'1':'');
  document.getElementById('darkBtn').textContent=isDark?'☀️':'🌙';
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  ({today:renderToday,week:renderWeek,history:renderHistory,library:renderLibrary})[name]?.();
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
function renderTodayActivity(sessions) {
  if(!sessions.length) return '';
  const totalSets=sessions.reduce((t,s)=>t+Object.values(s.sets).reduce((a,v)=>a+v.length,0),0);
  const totalVol=sessions.reduce((t,s)=>t+Object.values(s.sets).flat().reduce((a,b)=>a+(b.w||0)*b.r,0),0);
  const totalDur=sessions.reduce((t,s)=>t+((s.startTs&&s.finishedTs)?s.finishedTs-s.startTs:0),0);
  const summary=`${sessions.length} session${sessions.length>1?'s':''} · ${totalSets} sets`+(totalVol?` · ${totalVol}kg`:'')+( totalDur?` · ${fmtElapsed(totalDur)}`:'');
  const blocks=sessions.map(s=>{
    const g=getGroup(s.groupId);
    const dur=(s.startTs&&s.finishedTs)?' · '+fmtElapsed(s.finishedTs-s.startTs):'';
    const rows=Object.entries(s.sets).filter(([,sets])=>sets.length).map(([exId,sets])=>{
      const ex=getEx(exId);
      const cfg=g?.exercises?.find(c=>c.exId===exId);
      const tgt=cfg?.targetSets;
      const ok=tgt&&sets.length>=tgt;
      return `<div class="ta-ex-row">
        <span class="ta-ex-name">${ex?.name||exId}</span>
        <span class="ta-ex-count${ok?' ok':''}">${tgt?sets.length+'/'+tgt:sets.length}×</span>
        <span class="ta-ex-detail">${sets.map(fmtSet).join(' · ')}</span>
      </div>`;
    }).join('');
    return `<div class="ta-session-label">${g?.name||'Session'}${dur}</div>${rows}`;
  }).join('');
  return `<div class="today-activity" onclick="this.classList.toggle('open')">
    <div class="today-activity-hd">

function renderToday() {
  const dow=todayDow();
  const scheduledId=db.schedule[dow];
  const session=getActiveSession();
  const el=document.getElementById('todayContent');
  const titleEl=document.getElementById('todayTitle');
  const todayDone=db.sessions.filter(s=>s.date===todayStr()&&s.finished);

  const group=session?getGroup(session.groupId):(scheduledId?getGroup(scheduledId):null);
  titleEl.textContent=group?.name||DAYS[dow];

  if(session) startElapsedTimer(); else stopElapsedTimer();
  updateTimerUI();

  let html=renderTodayActivity(todayDone);

  if(!session){
    const scheduled=scheduledId?getGroup(scheduledId):null;
    if(!scheduled&&!todayDone.length){
      html+=`<div class="empty-state"><h2>No workout today</h2><p>Assign a workout to this day in the Week tab, or pick one now.</p><button class="btn btn-primary" onclick="openGroupPicker('start')">Pick Workout</button></div>`;
    } else if(scheduled){
      html+=`<div class="empty-state"><h2>${scheduled.name}</h2><p>${scheduled.exercises?.length||0} exercises planned</p><button class="btn btn-primary" style="margin-bottom:10px" onclick="beginSession('${scheduled.id}')">Start${todayDone.length?' Another':''} Session</button><br><button class="btn btn-ghost btn-sm" onclick="openGroupPicker('start')">Pick Different Workout</button></div>`;
    } else {
      html+=`<div style="text-align:center;padding:20px 0 30px"><button class="btn btn-ghost" onclick="openGroupPicker('start')">+ Start Another Session</button></div>`;
    }
    el.innerHTML=html; return;
  }

  const activeGroup=getGroup(session.groupId);
  const exConfigs=activeGroup?activeGroup.exercises:Object.keys(session.sets).map(exId=>({exId,targetSets:null,targetReps:null,targetWeight:null,restSeconds:90}));

  html+=`<div class="finish-bar"><span>Session active</span><div style="display:flex;gap:8px"><button class="btn btn-sm btn-ghost" onclick="cancelSession()">Cancel</button><button class="btn btn-sm btn-green" onclick="finishSession()">Finish ✓</button></div></div>`;

  exConfigs.forEach(cfg=>{
    const ex=getEx(cfg.exId); if(!ex) return;
    const sets=session.sets[cfg.exId]||[];
    const tgt=cfg.targetSets;
    const done=sets.length;
    const onTarget=tgt&&done>=tgt;
    const isBW=cfg.targetWeight==null;
    const restSecs=cfg.restSeconds||90;
    const restLabel=restSecs>=60?Math.floor(restSecs/60)+'m'+(restSecs%60?restSecs%60+'s':''):restSecs+'s';

    let tgtStr='';
    if(cfg.targetSets){tgtStr=`${cfg.targetSets} × ${cfg.targetReps}`;tgtStr+=cfg.targetWeight!=null?` @ ${cfg.targetWeight}kg`:' BW';}

    const prev=getPrevBest(cfg.exId);
    const prevHtml=prev?`<div class="prev-best">Last (${fmtDate(prev.date)}): <strong>${(prev.sets[cfg.exId]||[]).map(fmtSet).join(' · ')}</strong></div>`:'';

    const pb=getPB(cfg.exId);
    const progressReady=checkProgressReady(cfg.exId,cfg.targetSets);

    const slots=tgt?tgt:done+1;
    const totalSlots=slots+(done>=slots?1:0);
    let togglesHtml='';
    for(let i=0;i<totalSlots;i++) togglesHtml+=`<button class="set-toggle${i<done?' done':''}" onclick="toggleSet('${cfg.exId}',${i})">${i+1}</button>`;

    html+=`<div class="ex-card${done?' has-sets':''}" id="exc-${cfg.exId}">
      <div class="ex-card-header">
        <div class="ex-card-info"><div class="ex-name">${ex.name}</div><div class="ex-cat">${ex.cat}</div></div>
        <div class="ex-card-right"><div class="set-progress${onTarget?' on-target':''}">${tgt?done+'/'+tgt:done} sets</div></div>
      </div>
      ${(tgtStr||pb||progressReady)?`<div class="badge-row">${tgtStr?`<span class="target-badge">Target: ${tgtStr}</span>`:''} ${pb?`<span class="pb-badge">🏆 PB: ${fmtPB(pb)}</span>`:''} ${progressReady?`<span class="progress-badge">↑ Ready to progress?</span>`:''}</div>`:''}
      ${prevHtml}
      <div class="set-toggles">${togglesHtml}</div>
      <div class="log-row">
        <input type="number" id="w-${cfg.exId}" placeholder="${isBW?'BW':cfg.targetWeight}" min="0" step="2.5" value="${cfg.targetWeight!=null?cfg.targetWeight:''}"/>
        <span class="log-sep">×</span>
        <input type="number" id="r-${cfg.exId}" placeholder="${cfg.targetReps||'reps'}" min="1" step="1" value="${cfg.targetReps||''}"/>
      </div>
      ${isBW?'<div class="bw-hint">Leave weight blank to log as bodyweight</div>':''}
      <button class="rest-trigger" onclick="startRest(${restSecs})">⏱ Rest ${restLabel}</button>
    </div>`;
  });

  html+=`<div class="card" style="margin-top:4px;margin-bottom:20px">
    <div class="notes-label">Session Notes</div>
    <textarea class="notes-area" placeholder="How did it feel? Any PRs..." oninput="saveNotes(this.value)">${session.notes||''}</textarea>
  </div>`;

  el.innerHTML=html;
}

function beginSession(groupId){startSession(groupId);renderToday();}

function toggleSet(exId,setIndex){
  const s=getActiveSession(); if(!s) return;
  if(!s.sets[exId]) s.sets[exId]=[];
  const sets=s.sets[exId];
  if(setIndex<sets.length){openEditSet(exId,setIndex);return;}
  if(setIndex===sets.length){
    const group=getGroup(s.groupId);
    const cfg=group?.exercises?.find(c=>c.exId===exId);
    const w=parseFloat(document.getElementById('w-'+exId)?.value)||null;
    const r=parseInt(document.getElementById('r-'+exId)?.value)||cfg?.targetReps||1;
    logSetToSession(exId,w,r);
    refreshCard(exId);
    startRest(cfg?.restSeconds||90);
  }
}

let editSetCtx=null;
function openEditSet(exId,idx){
  const s=getActiveSession(); if(!s) return;
  const sets=s.sets[exId]||[];
  const set=sets[idx]; if(!set) return;
  editSetCtx={exId,idx};
  document.getElementById('editSetNum').textContent=idx+1;
  document.getElementById('editSetWeight').value=set.w!=null?set.w:'';
  document.getElementById('editSetReps').value=set.r||'';
  document.getElementById('editSetRemoveBtn').style.display=idx===sets.length-1?'':'none';
  document.getElementById('editSetOverlay').classList.add('open');
}
function saveEditSet(){
  const s=getActiveSession(); if(!s||!editSetCtx) return;
  const{exId,idx}=editSetCtx;
  const w=parseFloat(document.getElementById('editSetWeight').value)||null;
  const r=parseInt(document.getElementById('editSetReps').value)||1;
  s.sets[exId][idx]={w,r};
  saveDB(); closeModal('editSetOverlay'); refreshCard(exId);
}
function removeEditSet(){
  const s=getActiveSession(); if(!s||!editSetCtx) return;
  const{exId,idx}=editSetCtx;
  s.sets[exId].splice(idx,1);
  saveDB(); closeModal('editSetOverlay'); refreshCard(exId);
}

function refreshCard(exId){
  const s=getActiveSession();
  const sets=s?.sets[exId]||[];
  const done=sets.length;
  const card=document.getElementById('exc-'+exId); if(!card) return;
  const group=getGroup(s?.groupId);
  const cfg=group?.exercises?.find(c=>c.exId===exId);
  const tgt=cfg?.targetSets;
  const onTarget=tgt&&done>=tgt;
  card.classList.toggle('has-sets',done>0);
  const prog=card.querySelector('.set-progress');
  if(prog){prog.textContent=`${tgt?done+'/'+tgt:done} sets`;prog.classList.toggle('on-target',onTarget);}
  const tw=card.querySelector('.set-toggles');
  if(tw){
    const slots=tgt?tgt:done+1;
    const tot=slots+(done>=slots?1:0);
    let h='';
    for(let i=0;i<tot;i++) h+=`<button class="set-toggle${i<done?' done':''}" onclick="toggleSet('${exId}',${i})">${i+1}</button>`;
    tw.innerHTML=h;
  }
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderVolumeChart(){
  const now=new Date();
  const mo=now.getDay()===0?6:now.getDay()-1;
  const mon=new Date(now); mon.setDate(now.getDate()-mo); mon.setHours(0,0,0,0);
  const weeks=[];
  for(let w=7;w>=0;w--){
    const s=new Date(mon); s.setDate(mon.getDate()-w*7);
    const e=new Date(s); e.setDate(s.getDate()+7);
    const s1=`${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}`;
    const s2=`${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}-${String(e.getDate()).padStart(2,'0')}`;
    const vol=db.sessions.filter(x=>x.date>=s1&&x.date<s2&&x.finished).reduce((t,x)=>t+Object.values(x.sets).flat().reduce((a,b)=>a+(b.w||0)*b.r,0),0);
    weeks.push({label:`${s.getDate()}/${s.getMonth()+1}`,vol});
  }
  const maxVol=Math.max(...weeks.map(w=>w.vol),1);
  const BW=26,GAP=8,CH=60,LH=16,TW=weeks.length*(BW+GAP)-GAP;
  const bars=weeks.map((w,i)=>{
    const h=w.vol>0?Math.max(4,(w.vol/maxVol)*CH):2;
    const x=i*(BW+GAP);
    return `<rect x="${x}" y="${CH-h}" width="${BW}" height="${h}" rx="4" fill="${w.vol>0?'var(--accent)':'var(--border)'}"/>
            <text x="${x+BW/2}" y="${CH+LH-2}" text-anchor="middle" font-size="7.5" fill="var(--muted)" font-family="Hanken Grotesk,sans-serif">${w.label}</text>`;
  }).join('');
  return `<div class="vol-chart-wrap"><div class="vol-chart-title">Weekly Volume — kg lifted</div><svg viewBox="0 0 ${TW} ${CH+LH}" width="100%" style="display:block;overflow:visible">${bars}</svg></div>`;
}

function renderHistory(){
  const sessions=[...db.sessions].reverse();
  if(!sessions.length){document.getElementById('historyContent').innerHTML=`<div class="empty-state"><h2>No history yet</h2><p>Finish a session to see it here</p></div>`;return;}
  const cards=sessions.map(s=>{
    const g=getGroup(s.groupId);
    const totalSets=Object.values(s.sets).reduce((a,b)=>a+b.length,0);
    const vol=Object.values(s.sets).flat().reduce((a,b)=>a+(b.w||0)*b.r,0);
    const dur=(s.startTs&&s.finishedTs)?fmtElapsed(s.finishedTs-s.startTs):'';
    const exRows=Object.entries(s.sets).filter(([,sets])=>sets.length).map(([exId,sets])=>{
      const ex=getEx(exId);
      return `<div class="session-ex"><div class="session-ex-name">${ex?ex.name:exId}</div><div class="session-sets">${sets.map(fmtSet).join(' · ')}</div></div>`;
    }).join('');
    return `<div class="session-card" onclick="this.querySelector('.session-body').classList.toggle('open')">
      <div class="session-header">
        <div class="session-info">
          <div class="session-date">${fmtDate(s.date)}${!s.finished?' <span style="color:var(--green);font-size:.7rem">●</span>':''}</div>
          <div class="session-group">${g?g.name:'Custom'}</div>
        </div>
        <div class="session-meta">${totalSets} sets${vol?'<br>'+vol+'kg':''}${dur?'<br>'+dur:''}</div>
      </div>
      <div class="session-body">${exRows||'<span style="color:var(--muted);font-size:.8rem">No sets logged</span>'}${s.notes?`<div class="session-note">"${s.notes}"</div>`:''}</div>
    </div>`;
  }).join('');
  document.getElementById('historyContent').innerHTML=renderVolumeChart()+cards;
}

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`workout-${getActiveProfile()?.name||'backup'}-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.exercises||!data.groups||!data.sessions) throw new Error();
        if(!confirm('Replace all current profile data with this backup?')) return;
        db=data; saveDB(); renderLibraryContent();
        alert('Import successful!');
      }catch{alert('Invalid backup file.');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Cloud Sync ────────────────────────────────────────────────────────────────
function getGistCfg(){try{return JSON.parse(localStorage.getItem('wapp_gist')||'{}');}catch{return {};}}
function setGistCfg(cfg){localStorage.setItem('wapp_gist',JSON.stringify(cfg));}
function setSyncStatus(msg,cls){
  const el=document.getElementById('syncStatus');
  if(el){el.textContent=msg;el.className='sync-status '+(cls||'');}
}
function saveGistCfg(){
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  setGistCfg({...getGistCfg(),token,gistId});
  setSyncStatus('Saved.','' );
}

let syncTimer=null;
function scheduleAutoSync(){
  const cfg=getGistCfg();
  if(!cfg.token) return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushNow,8000);
}

async function pushNow(){
  const cfg=getGistCfg();
  if(!cfg.token){alert('Set up Cloud Sync in Library first.');return;}
  setSyncStatus('Pushing...','');
  try{
    const profiles=getProfiles();
    const files={'_profiles.json':{content:JSON.stringify(profiles)}};
    profiles.forEach(p=>{const d=localStorage.getItem('wapp_'+p.id);if(d)files[p.id+'.json']={content:d};});
    const url='https://api.github.com/gists'+(cfg.gistId?'/'+cfg.gistId:'');
    const method=cfg.gistId?'PATCH':'POST';
    const resp=await fetch(url,{method,headers:{'Authorization':'Bearer '+cfg.token,'Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'},body:JSON.stringify({description:'Workout App Data',public:false,files})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.message||resp.status);}
    const data=await resp.json();
    const newCfg={...cfg,gistId:data.id,lastSync:Date.now()};
    setGistCfg(newCfg);
    const gEl=document.getElementById('gistId');
    if(gEl) gEl.value=data.id;
    setSyncStatus('Pushed '+new Date().toLocaleTimeString(),'sync-ok');
  }catch(e){setSyncStatus('Push failed: '+e.message,'sync-err');}
}

async function pullNow(){
  const cfg=getGistCfg();
  if(!cfg.token||!cfg.gistId){alert('Save your token and Gist ID first, then push before pulling.');return;}
  if(!confirm('Pull from cloud? This replaces all local profile data.')) return;
  setSyncStatus('Pulling...','');
  try{
    const resp=await fetch('https://api.github.com/gists/'+cfg.gistId,{headers:{'Authorization':'Bearer '+cfg.token,'X-GitHub-Api-Version':'2022-11-28'}});
    if(!resp.ok) throw new Error(resp.status);
    const data=await resp.json();
    if(data.files['_profiles.json']){
      const profiles=JSON.parse(data.files['_profiles.json'].content);
      localStorage.setItem('wapp_profiles',JSON.stringify(profiles));
      profiles.forEach(p=>{if(data.files[p.id+'.json'])localStorage.setItem('wapp_'+p.id,data.files[p.id+'.json'].content);});
    }
    setGistCfg({...cfg,lastSync:Date.now()});
    loadDB(); updateProfileBtn(); renderLibraryContent();
    setSyncStatus('Pulled '+new Date().toLocaleTimeString(),'sync-ok');
  }catch(e){setSyncStatus('Pull failed: '+e.message,'sync-err');}
}

      </div>
    </div>`;
  }).join('');
}
function updateExTarget(idx,key,val){editingGroup.exercises[idx][key]=val?parseFloat(val):null;}
function moveEx(i,dir){const a=editingGroup.exercises,j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];renderGroupExList();}
function removeExAt(i){editingGroup.exercises.splice(i,1);renderGroupExList();}
function saveGroup(){
  const name=document.getElementById('groupEditorName').value.trim();
  if(!name){document.getElementById('groupEditorName').focus();return;}
  if(editingGroup.id){const g=getGroup(editingGroup.id);g.name=name;g.exercises=editingGroup.exercises;}
  else db.groups.push({id:uid(),name,exercises:editingGroup.exercises});
  saveDB();closeModal('groupEditorOverlay');renderLibraryContent();
}

// ── EX PICKER ─────────────────────────────────────────────────────────────────
function openExPicker(){document.getElementById('exSearch').value='';renderExPicker();document.getElementById('exPickerOverlay').classList.add('open');}
function renderExPicker(){
  const q=document.getElementById('exSearch').value.toLowerCase();
  const taken=new Set(editingGroup.exercises.map(c=>c.exId));
  const avail=db.exercises.filter(e=>!taken.has(e.id)&&e.name.toLowerCase().includes(q));
  let html='';
  CATS.forEach(cat=>{
    const exs=avail.filter(e=>e.cat===cat);if(!exs.length) return;
    if(!q) html+=`<div class="cat-group-label">${cat}</div>`;
    exs.forEach(ex=>{html+=`<div class="modal-option" onclick="addExToGroup('${ex.id}')"><span class="modal-option-name">${ex.name}</span><span style="color:var(--muted);font-size:.72rem">${ex.cat}</span></div>`;});
  });
  document.getElementById('exPickerList').innerHTML=html||`<div style="color:var(--muted);padding:14px;text-align:center">No exercises found</div>`;
}
function addExToGroup(exId){editingGroup.exercises.push({exId,targetSets:3,targetReps:10,targetWeight:null,restSeconds:90});closeModal('exPickerOverlay');renderGroupExList();}

// ── NEW EXERCISE ──────────────────────────────────────────────────────────────
let newExCat='Barbell';
function openNewExModal(){
  newExCat='Barbell';
  document.getElementById('newExName').value='';
  document.getElementById('catBtns').innerHTML=CATS.map(c=>`<button class="preset${c===newExCat?' active':''}" onclick="selectCat('${c}')">${c}</button>`).join('');
  document.getElementById('newExOverlay').classList.add('open');
}
function selectCat(cat){newExCat=cat;document.querySelectorAll('#catBtns .preset').forEach(b=>b.classList.toggle('active',b.textContent===cat));}
function saveNewExercise(){
  const name=document.getElementById('newExName').value.trim();
  if(!name){document.getElementById('newExName').focus();return;}
  db.exercises.push({id:uid(),name,cat:newExCat});saveDB();closeModal('newExOverlay');renderLibraryContent();
}

// ── GROUP PICKER ──────────────────────────────────────────────────────────────
let pickerCtx=null;
function openGroupPicker(ctx){
  pickerCtx=ctx;
  const isWeek=ctx.startsWith('week-');
  const dow=isWeek?parseInt(ctx.split('-')[1]):null;
  const currentId=dow!==null?db.schedule[dow]:null;
  document.getElementById('groupPickerTitle').textContent=isWeek?`${DAYS[dow]} — Assign Workout`:'Choose Workout';
  let html='';
  if(isWeek) html+=`<div class="modal-option${!currentId?' selected':''}" onclick="assignGroup(null)"><span class="modal-option-name">Rest</span>${!currentId?'✓':''}</div>`;
  db.groups.forEach(g=>{html+=`<div class="modal-option${g.id===currentId?' selected':''}" onclick="assignGroup('${g.id}')"><span class="modal-option-name">${g.name}</span>${g.id===currentId?'✓':''}</div>`;});
  document.getElementById('groupPickerList').innerHTML=html;
  document.getElementById('groupPickerOverlay').classList.add('open');
}
function assignGroup(groupId){
  const ctx=pickerCtx;closeModal('groupPickerOverlay');
  if(ctx.startsWith('week-')){db.schedule[parseInt(ctx.split('-')[1])]=groupId;saveDB();renderWeek();}
  else{
    if(!groupId) return;
    const s=getActiveSession();
    if(s){s.groupId=groupId;saveDB();}else{startSession(groupId);}
    renderToday();
  }
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('open');}
function overlayClose(e,id){if(e.target===e.currentTarget)closeModal(id);}

// ── INIT ──────────────────────────────────────────────────────────────────────
initProfiles();
loadDB();
updateProfileBtn();
if(localStorage.getItem('wapp_dark')){document.documentElement.classList.add('dark');document.getElementById('darkBtn').textContent='☀️';}
updateTimerUI();
renderToday();

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter'||e.target.tagName!=='INPUT') return;
  const id=e.target.id;
  if(id.startsWith('r-')){const exId=id.slice(2);const sets=getActiveSession()?.sets[exId]||[];toggleSet(exId,sets.length);}
  else if(id.startsWith('w-')) document.getElementById('r-'+id.slice(2))?.focus();
});
</script>
</body>
</html>
